#======================================== 󰑓 RECARGAR CONFIGURACIONES

bind R source-file ~/.config/tmux/tmux.conf \; display-message "Recargado!"

#======================================== 󰌓 PREFIJO

unbind C-b
set -g prefix C-space
bind C-space send-prefix

#========================================  VENTANAS

# Moverte entre las ventanas
bind -n M-Left previous-window
bind -n M-Right next-window

# Cambiar posición de la venatana actual
bind -n C-S-Left swap-window -t -1
bind -n C-S-Right swap-window -t +1

# Moverte a la ventana n
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

#========================================  PANELES

# Dividir horizontalmente
unbind %
bind | split-window -h -c "#{pane_current_path}"

# Dividir verticalmente
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Abrir nueva ventana en el directorio actual
bind c new-window -c "#{pane_current_path}"

# Moverte entre los paneles
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Modo vi
setw -g mode-keys vi  # Teclas modo vim
bind-key -T copy-mode-vi  'v' send -X begin-selection # Copiar modo vim
bind -T copy-mode-vi  'y' send -X copy-pipe-and-cancel # Pegar modo vim
unbind -T copy-mode-vi MouseDragEnd1Pane # Copiar selección del mouse

# Sincronizar ventanas
bind y set-window-option synchronize-panes\; display-message "Sincronización Modo Alternando"

