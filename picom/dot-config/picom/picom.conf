#======================================== 󰘷 SHADOWS

shadow = true;

shadow:
{
    radius = 7     # blur radius for shadows, in pixels. (defaults to 12)
    offset-x = -7  # left offset for shadows, in pixels. (defaults to -15)
    offset-y = -7  # top offset for shadows, in pixels. (defaults to -15)
#   color = "#000000"
#   opacity = .75   # opacity of shadows. (0.0 - 1.0, defaults to 0.75)
#   Specify a list of conditions of windows that should have no shadow.
    exclude = [
        "name = 'Notification'",
        "class_g ?= 'Notify-osd'",
        "class_g = 'firefox' && !window_type *= 'normal'",
        "class_g = 'LibreWolf' && !window_type *= 'normal'",
        "_GTK_FRAME_EXTENTS@:c",
        "_NET_WM_WINDOW_TYPE@:32a * = '_NET_WM_WINDOW_TYPE_DOCK'",
    ]
};


#======================================== 󰋺 FADING 

fading = true

fade:
{
    in-step = 0.03     # Opacity change between steps while fading in. (0.01 - 1.0, defaults to 0.028)
    out-step = 0.03    # Opacity change between steps while fading out. (0.01 - 1.0, defaults to 0.03)
#   delta = 10         # The time between steps in fade step, in milliseconds. (> 0, defaults to 10)
#   exclude = []       # Specify a list of conditions of windows that should not be faded.
};

# no-fading-destroyed-argb = false;  # Do not fade destroyed ARGB windows with WM frame.
# no-fading-openclose = false;       # Do not fade on window open/close.

#======================================== 󰗌 TRANSPARENCY/OPACITY

# frame-opacity = 1     				# Opacity of window titlebars and borders. (0.1 - 1.0, disabled by default)
# active-opacity = 1.0      			# Default opacity for active windows. (0.0 - 1.0, defaults to 1.0)
# inactive-opacity = 1  				# Opacity of inactive windows. (0.1 - 1.0, defaults to 1.0)
# inactive-opacity-override = false;
# inactive-dim = 0.0        			# Dim inactive windows. (0.0 - 1.0, defaults to 0.0)
# inactive-dim-fixed = 1.0  			# Use fixed inactive dim value, instead of adjusting according to window opacity.

#focus-exclude = [ "class_g = 'Cairo-clock'" ] ;

#opacity-rule = [
#"80:class_g = 'dwm'",
#"80:class_g = 'st-256color' && !focused",
#"60:class_g = 'st-256color' && focused"
#];

#======================================== 󰘇 CORNERS

# Radius of rounded window corners.
# When > 0, the compositor will round the corners of windows.
# corner-radius = 0

# Exclude
#rounded-corners-exclude = [
#  "window_type = 'dock'",
#  "window_type = 'desktop'"
#];

#======================================== 󰂵 BACKGROUND-BLURRING

# Parameters for background blurring

blur:
{
    method = "dual_kawase"
    size = 10
    strength = 8
    background = true
    background-fixed = true
	deviation = false
	kern = "3x3box"
};

#========================================  SETTINGS

# dbus = true;      # enable/disable.
# daemon = false;   # enable/disable.

backend = "glx" # backends: `xrender`, `glx`, or `xr_glx_hybrid`.
vsync = true    # enable/disable.

#mark-wmwin-focused = true       # mark-wmwin-focused = false
#mark-ovredir-focused = true

detect-rounded-corners = true
detect-client-opacity = true
detect-transient = true
# glx-no-stencil = true
use-damage = true
use-ewmh-active-win = true
log-level = "warn"

#======================================== 󰗘 ANIMATIONS

animations = (
    {
	    triggers = [ "close" ];
    	preset = "slide-out";
	    direction = "down";
    },
    {
	    triggers = [ "hide" ];
    	preset = "slide-out";
	    direction = "left";
    },
    {
	    triggers = [ "open" "show" ];
    	preset = "slide-in";
	    direction = "up";
    },
    {
    	triggers = [ "geometry" ];
	    preset = "geometry-change";
    },
)

#======================================== 󱍓 RULES

rules = (
	# { match = "name = 'dwm'"; opacity = 1; }
#	{ match = "focused"; opacity = 1; },
#	{ match = "!focused"; opacity = 1; },
#   { match = "name = 'dwm'"; opacity = 0.6; },
#   { match= "name = 'st' && focused"; opacity = 0.9; },
#   { match= "name = 'st' && !focused"; opacity = 0.8; },
    { match= "name = 'st'"; opacity = 0.7; },
    { match= "name = 'st'"; blur-background = false; },
#   { match= "class_i = 'emacs'"; opacity = 0.7; },
    { match= "class_i = 'emacs'"; blur-background = false; },
	{ match = "TOOLTIP"; fade = true; shadow = true; opacity = 0.5; focus = true; full-shadow = false; },
	{ match = "window_type = 'dock'"; shadow = false; clip-shadow-above = true; },
	{ match = "window_type = 'dnd'"; shadow = false; },
	{ match = "POPUP_MENU"; opacity = false; shadow = false; },
	{ match = "DROPDOWN_MENU"; opacity = false; },
)

